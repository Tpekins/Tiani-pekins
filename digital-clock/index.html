<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Digital Multi-Timezone Clock</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
            animation: gradientShift 15s ease infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); }
            50% { background: linear-gradient(135deg, #764ba2 0%, #667eea 100%); }
        }

        .container {
            width: 100%;
            max-width: 1200px;
        }

        header {
            text-align: center;
            color: white;
            margin-bottom: 40px;
            animation: slideDown 0.8s ease;
        }

        @keyframes slideDown {
            from {
                opacity: 0;
                transform: translateY(-30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        h1 {
            font-size: 2.5rem;
            font-weight: 300;
            letter-spacing: 2px;
            margin-bottom: 10px;
            text-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .subtitle {
            font-size: 1rem;
            opacity: 0.9;
            font-weight: 300;
        }

        .controls {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 20px;
            border-radius: 15px;
            margin-bottom: 30px;
            display: flex;
            gap: 10px;
            flex-wrap: wrap;
            align-items: center;
            justify-content: center;
            animation: slideUp 0.8s ease 0.2s both;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        select {
            padding: 12px 15px;
            border: 2px solid white;
            border-radius: 8px;
            background: rgba(255, 255, 255, 0.2);
            color: white;
            font-size: 1rem;
            cursor: pointer;
            transition: all 0.3s ease;
            min-width: 200px;
        }

        select:hover,
        select:focus {
            background: rgba(255, 255, 255, 0.3);
            outline: none;
            box-shadow: 0 0 20px rgba(255, 255, 255, 0.3);
        }

        select option {
            background: #667eea;
            color: white;
        }

        button {
            padding: 12px 30px;
            background: white;
            color: #667eea;
            border: none;
            border-radius: 8px;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 8px 20px rgba(0, 0, 0, 0.2);
            background: #f0f0f0;
        }

        button:active {
            transform: translateY(0);
        }

        .clocks-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(280px, 1fr));
            gap: 20px;
            animation: fadeIn 0.8s ease 0.4s both;
        }

        @keyframes fadeIn {
            from {
                opacity: 0;
            }
            to {
                opacity: 1;
            }
        }

        .clock-card {
            background: rgba(255, 255, 255, 0.95);
            border-radius: 15px;
            padding: 25px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            transition: all 0.3s ease;
            position: relative;
            overflow: hidden;
        }

        .clock-card:hover {
            transform: translateY(-10px);
            box-shadow: 0 30px 80px rgba(0, 0, 0, 0.4);
        }

        .clock-card::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            height: 4px;
            background: linear-gradient(90deg, #667eea, #764ba2);
        }

        .timezone-name {
            font-size: 1.3rem;
            font-weight: 600;
            color: #333;
            margin-bottom: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .timezone-name .remove-btn {
            padding: 5px 10px;
            font-size: 0.8rem;
            background: #ff6b6b;
            color: white;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .timezone-name .remove-btn:hover {
            background: #ff5252;
            transform: scale(1.05);
        }

        .utc-offset {
            font-size: 0.9rem;
            color: #666;
            margin-bottom: 12px;
            font-weight: 500;
        }

        .time-display {
            font-size: 2.5rem;
            font-weight: 300;
            color: #667eea;
            font-family: 'Courier New', monospace;
            margin-bottom: 8px;
            letter-spacing: 2px;
        }

        .date-display {
            font-size: 0.95rem;
            color: #666;
            font-weight: 500;
        }

        .day-display {
            font-size: 0.9rem;
            color: #999;
            margin-top: 5px;
        }

        .empty-state {
            text-align: center;
            color: white;
            padding: 40px;
            font-size: 1.1rem;
            animation: fadeIn 0.5s ease;
        }

        @media (max-width: 768px) {
            h1 {
                font-size: 1.8rem;
            }

            .time-display {
                font-size: 2rem;
            }

            .controls {
                flex-direction: column;
                gap: 10px;
            }

            select,
            button {
                width: 100%;
            }

            .clocks-grid {
                grid-template-columns: 1fr;
            }
        }

        @media (prefers-reduced-motion: reduce) {
            * {
                animation: none !important;
                transition: none !important;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌍 Multi-Timezone Clock</h1>
            <p class="subtitle">Real-time clock display across the world</p>
        </header>

        <div class="controls">
            <select id="timezoneSelect">
                <option value="">Select a timezone to add...</option>
            </select>
            <button onclick="addTimezone()">Add Timezone</button>
        </div>

        <div class="clocks-grid" id="clocksContainer">
            <!-- Clock cards will be generated here -->
        </div>
    </div>

    <script src="script.js"></script>
</body>
</html>
